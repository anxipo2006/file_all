<!doctype html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="description" content="Master file tool: dịch, chuyển đổi, nén, chia file cho AI, PDF/image/archive tools."/><title>Pro File Tool Master</title></head><body><main class="shell"><section class="hero"><div class="badge">🧠 Master Tool Suite</div><h1>Pro File Tool Master</h1><p>One dashboard cho mọi tác vụ file: AI-ready split, dịch tài liệu, convert, PDF tools, image tools, archive tools.</p></section><section class="panel"><form id="tool-form"><div class="tool-grid"><label>Nhóm tool<select id="category"></select></label><label>Tool/action<select id="action" name="action"></select></label></div><label id="goal-wrap">Mục tiêu Master<select id="goal"><option value="ai_read_large_file">AI đọc file lớn</option><option value="smallest_possible">Nhỏ nhất có thể</option><option value="keep_quality">Giữ chất lượng</option><option value="translate_document">Dịch tài liệu</option><option value="convert_for_sharing">Chuyển đổi để chia sẻ</option><option value="extract_for_ai">Trích nội dung cho AI</option></select></label><label class="upload-zone" for="file-input"><span>📁</span><strong>Chọn file/files</strong><small id="upload-hint">Hỗ trợ nhiều định dạng</small><input id="file-input" type="file" multiple required/></label><div id="file-name" class="file-name">Chưa chọn file</div><div class="grid"><label>Target MB<input id="target-mb" type="number" min="1" max="2048" value="100"/></label><label>Max part MB<input id="part-mb" type="number" min="1" max="500" value="100"/></label><label>Ngôn ngữ dịch<select id="target-lang"><option value="vi">Tiếng Việt</option><option value="en">English</option><option value="ja">日本語</option><option value="ko">한국어</option><option value="zh-CN">中文</option><option value="fr">Français</option></select></label><label>Khoảng trang<input id="page-range" value="1-1" placeholder="1-5,8,10-12"/></label><label>Góc xoay<select id="rotate"><option>90</option><option>180</option><option>270</option></select></label><label>Ảnh output<select id="output-format"><option>JPEG</option><option>PNG</option><option>WEBP</option></select></label><label>Max width<input id="max-width" type="number" value="1800"/></label></div><button id="submit-btn" type="submit">🚀 Chạy tool</button></form><aside class="result-card"><h2>Kết quả</h2><p id="status">Chọn tool rồi upload file.</p><div id="metrics" class="metrics"></div><a id="download-link" class="download hidden" download>⬇️ Tải kết quả</a></aside></section></main><script type="module" src="/src/main.js"></script></body></html>
